<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>주식회사 주하헬스케어</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f5f7;
      color: #222;
    }
    .wrapper {
      text-align: center;
      padding: 2rem 3rem;
      border-radius: 1.5rem;
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }
    .company-name {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    .status {
      font-size: 1rem;
      color: #666;
    }

    @media (max-width: 480px) {
      .wrapper {
        width: 100%;
        margin: 0 1rem;
        padding: 1.5rem;
      }
      .company-name {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="company-name">주하헬스케어 주식회사</div>
    <div class="status">홈페이지 준비중입니다.</div>
  </div>
</body>
</html>
